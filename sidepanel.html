<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 16px; width: 300px; }
    input, button { width: 100%; margin: 6px 0; padding: 8px; box-sizing: border-box; }
    #log { font-size: 12px; color: #555; max-height: 200px; overflow-y: auto; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>Gemini Bulk → Drive</h3>
  <input type="file" id="txtFile" accept=".txt" />
  <input type="text" id="folderName" placeholder="Subfolder name (e.g. cyberpunk-batch)" />
  <button id="startBtn">▶ Start</button>
  <button id="stopBtn" disabled>⏹ Stop</button>
  <div id="log"></div>
  <script src="sidepanel.js"></script>
</body>
</html>
